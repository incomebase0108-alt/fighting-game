<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>格闘ゲーム（試作版）</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a14;
    color: #fff;
    font-family: 'Yu Gothic', 'Meiryo', sans-serif;
    width: 100%; height: 100%;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; padding: 12px 0;
  }
  h1 {
    font-size: 18px;
    margin: 4px 0 8px;
    letter-spacing: 0.08em;
    color: #ffcc66;
  }
  .canvas-wrap {
    position: relative;
    display: flex; justify-content: center; align-items: center;
  }
  canvas {
    background: #000;
    display: block;
    width: min(100vw - 16px, 100vh * 16/9);
    height: auto;
    aspect-ratio: 16 / 9;
    box-shadow: 0 0 40px rgba(255,100,0,0.35);
    border: 2px solid #333;
    touch-action: none;
  }
  .info {
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: #ccc;
    max-width: 960px;
    background: #1a1a26;
    padding: 12px 18px;
    border-radius: 6px;
    border: 1px solid #333;
  }
  .info kbd {
    background: #333; padding: 2px 7px; border-radius: 3px;
    color: #fff; font-family: 'Consolas', monospace;
    font-size: 12px; border: 1px solid #555;
  }
  .info strong { color: #ffcc66; }
  .info .sec { margin-bottom: 6px; }

  /* タッチオーバーレイ（モバイル時のみ表示） */
  .touch-overlay {
    display: none;
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5;
    align-items: flex-end;            /* 操作群を画面下に */
    justify-content: space-between;   /* 十字キー=左 / アクション=右 */
    padding: 0 12px 12px;
  }
  body.touch-mode .touch-overlay { display: flex; }
  body.touch-mode { padding: 0; height: 100vh; }
  body.touch-mode h1, body.touch-mode .info { display: none; }
  body.touch-mode canvas {
    width: min(100vw, 100vh * 16/9);
    border: none; box-shadow: none;
  }
  body.touch-mode .canvas-wrap {
    width: 100vw; height: 100vh;
    align-items: flex-start;   /* 縦画面では画面を上寄せ、下に操作ボタン領域 */
  }

  .dpad-area, .action-area {
    pointer-events: auto;
    display: grid;
    gap: 8px;
  }
  .dpad-area {
    grid-template-columns: repeat(3, clamp(38px, 13vw, 56px));
    grid-template-rows: repeat(3, clamp(38px, 13vw, 56px));
  }
  .dpad-btn {
    background: rgba(40,40,60,0.55);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    border-radius: 12px;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.05s;
    padding: 0;
  }
  .dpad-btn.up    { grid-column: 2; grid-row: 1; }
  .dpad-btn.left  { grid-column: 1; grid-row: 2; }
  .dpad-btn.right { grid-column: 3; grid-row: 2; }
  .dpad-btn.down  { grid-column: 2; grid-row: 3; }
  .dpad-btn.upleft    { grid-column: 1; grid-row: 1; }
  .dpad-btn.upright   { grid-column: 3; grid-row: 1; }
  .dpad-btn.downleft  { grid-column: 1; grid-row: 3; }
  .dpad-btn.downright { grid-column: 3; grid-row: 3; }
  .dpad-btn.diag { font-size: 15px; background: rgba(40,40,60,0.40); }
  .dpad-btn.pressed { background: rgba(255,180,80,0.7); }

  .action-area {
    grid-template-columns: repeat(2, clamp(42px, 15vw, 64px));
    grid-template-rows: repeat(2, clamp(42px, 15vw, 64px));
  }
  .action-btn {
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    color: #fff;
    font-weight: bold;
    font-size: 18px;
    padding: 0;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    transition: filter 0.05s, transform 0.05s;
  }
  .action-btn.guard { grid-column: 1; grid-row: 1; background: rgba(70,140,240,0.55); }
  .action-btn.punch { grid-column: 2; grid-row: 1; background: rgba(240,80,80,0.55); }
  .action-btn.kick  { grid-column: 2; grid-row: 2; background: rgba(240,200,70,0.55); color: #222; }
  .action-btn.pressed { filter: brightness(1.5); transform: scale(0.95); }

  /* ミュート切替ボタン（常時表示） */
  #muteBtn {
    position: fixed; top: 10px; right: 12px; z-index: 20;
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(30,30,46,0.7); border: 1px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 20px; cursor: pointer; padding: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  #muteBtn:active { filter: brightness(1.4); }

  /* 縦持ち時の警告 */
  .rotate-hint {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    color: #fff;
    align-items: center; justify-content: center;
    flex-direction: column;
    font-size: 22px; text-align: center;
    z-index: 100;
    padding: 20px;
  }
  .rotate-hint .icon { font-size: 80px; margin-bottom: 20px; }
  /* 縦向きでもプレイ可能にするため回転の強制は無効化
     （回転ロックON / LINEアプリ内ブラウザ等で横向きにできない環境対策） */
</style>
</head>
<body>
<h1>格闘ゲーム（試作版）</h1>
<div class="canvas-wrap">
  <canvas id="game" width="960" height="540"></canvas>
</div>
<div class="info">
  <div class="sec"><strong>1P</strong>：移動 <kbd>A</kbd><kbd>D</kbd> ／ しゃがみ <kbd>S</kbd> ／ ジャンプ <kbd>W</kbd> ／ パンチ <kbd>F</kbd> ／ キック <kbd>G</kbd> ／ ガード <kbd>H</kbd></div>
  <div class="sec"><strong>2P</strong>：移動 <kbd>←</kbd><kbd>→</kbd> ／ しゃがみ <kbd>↓</kbd> ／ ジャンプ <kbd>↑</kbd> ／ パンチ <kbd>J</kbd> ／ キック <kbd>K</kbd> ／ ガード <kbd>L</kbd></div>
  <div class="sec"><strong>必殺技</strong>（自分から見て）：
    波動拳系 <kbd>↓</kbd><kbd>↘</kbd><kbd>→</kbd>＋P ／
    昇龍拳系 <kbd>→</kbd><kbd>↓</kbd><kbd>↘</kbd>＋P ／
    後ろ系 <kbd>↓</kbd><kbd>↙</kbd><kbd>←</kbd>＋K
  </div>
  <div class="sec"><strong>コンボ</strong>：技を当てた直後に次の技でキャンセル ―
    <kbd>P</kbd> → <kbd>K</kbd> → 必殺技 とつなげて連続ヒット！
  </div>
  <div class="sec"><strong>サウンド</strong>：<kbd>M</kbd> キー または右上の 🔊 ボタンでミュート切替（スマホは斜めボタンで必殺技コマンド入力可）</div>
</div>

<button id="muteBtn" aria-label="サウンド切替">🔊</button>

<div class="touch-overlay" id="touchOverlay">
  <div class="dpad-area" id="dpadArea">
    <button class="dpad-btn diag upleft"    data-key="upleft">↖</button>
    <button class="dpad-btn up"              data-key="up">▲</button>
    <button class="dpad-btn diag upright"   data-key="upright">↗</button>
    <button class="dpad-btn left"            data-key="left">◀</button>
    <button class="dpad-btn right"           data-key="right">▶</button>
    <button class="dpad-btn diag downleft"  data-key="downleft">↙</button>
    <button class="dpad-btn down"            data-key="down">▼</button>
    <button class="dpad-btn diag downright" data-key="downright">↘</button>
  </div>
  <div class="action-area" id="actionArea">
    <button class="action-btn guard" data-key="guard">守</button>
    <button class="action-btn punch" data-key="punch">P</button>
    <button class="action-btn kick"  data-key="kick">K</button>
  </div>
</div>

<div class="rotate-hint">
  <div class="icon">📱</div>
  <div>画面を横向きにしてください</div>
</div>

<script>
(() => {
'use strict';

// =========================================================
// 定数
// =========================================================
const W = 960, H = 540;
const GROUND_Y = 470;
const GRAVITY = 0.85;
const HIT_STOP = 4;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouch) document.body.classList.add('touch-mode');

// =========================================================
// 入力管理
// =========================================================
const heldKeys = new Set();
let pressedKeys = new Set();

function normKey(k) {
  return k.length === 1 ? k.toLowerCase() : k.toLowerCase();
}

window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.repeat) return;
  const k = normKey(e.key);
  pressedKeys.add(k);
  heldKeys.add(k);
});
window.addEventListener('keyup', e => {
  heldKeys.delete(normKey(e.key));
});

const KEYS = {
  p1: { left:'a', right:'d', up:'w', down:'s', punch:'f', kick:'g', guard:'h' },
  p2: { left:'arrowleft', right:'arrowright', up:'arrowup', down:'arrowdown', punch:'j', kick:'k', guard:'l' }
};

// CPU 仮想入力
const cpuState = {
  keys: { left:false, right:false, up:false, down:false, punch:false, kick:false, guard:false },
  pressed: new Set(),
  attackCooldown: 0,
  decisionTimer: 0,
  intent: 'approach'
};

function held(player, action) {
  if (player === 'cpu') return cpuState.keys[action] === true;
  return heldKeys.has(KEYS[player][action]);
}
function pressed(player, action) {
  if (player === 'cpu') return cpuState.pressed.has(action);
  return pressedKeys.has(KEYS[player][action]);
}

// =========================================================
// タッチ操作
// =========================================================
const dpadButtons = Array.from(document.querySelectorAll('#dpadArea button'));
const actionButtons = Array.from(document.querySelectorAll('#actionArea button'));
const allTouchButtons = [...dpadButtons, ...actionButtons];
const touchMap = new Map(); // touchId → Set<button>

function getButtonsAtPoint(x, y) {
  const found = new Set();
  // D-pad は隣接ボタンとの境界に余裕を持たせる（斜め入力を取りやすく）
  for (const btn of dpadButtons) {
    const r = btn.getBoundingClientRect();
    const pad = 5;   // 8方向ボタンが密集するので隣接バトンへのにじみを抑える
    if (x >= r.left - pad && x <= r.right + pad &&
        y >= r.top - pad && y <= r.bottom + pad) {
      found.add(btn);
    }
  }
  for (const btn of actionButtons) {
    const r = btn.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
      found.add(btn);
    }
  }
  return found;
}

// 1つのボタンが対応するアクション群（斜めボタンは2方向ぶん）
function actionsForButton(btn) {
  switch (btn.dataset.key) {
    case 'upleft':    return ['up', 'left'];
    case 'upright':   return ['up', 'right'];
    case 'downleft':  return ['down', 'left'];
    case 'downright': return ['down', 'right'];
    default:          return [btn.dataset.key];
  }
}

function syncTouchState() {
  const pressedBtns = new Set();
  for (const btns of touchMap.values()) for (const b of btns) pressedBtns.add(b);

  // 押下中ボタンの見た目
  for (const btn of allTouchButtons) btn.classList.toggle('pressed', pressedBtns.has(btn));

  // 押下中ボタン群 → 要求アクション集合（斜めは複数方向を立てる）
  const wantActions = new Set();
  for (const btn of pressedBtns) for (const a of actionsForButton(btn)) wantActions.add(a);

  // P1 の物理キーと突き合わせて押下/解放を反映
  for (const action of ['up', 'down', 'left', 'right', 'punch', 'kick', 'guard']) {
    const key = KEYS.p1[action];
    const want = wantActions.has(action);
    const has = heldKeys.has(key);
    if (want && !has) { pressedKeys.add(key); heldKeys.add(key); }
    else if (!want && has) { heldKeys.delete(key); }
  }
}

if (isTouch) {
  document.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const btns = getButtonsAtPoint(t.clientX, t.clientY);
      if (btns.size > 0) touchMap.set(t.identifier, btns);
    }
    syncTouchState();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (!touchMap.has(t.identifier)) continue;
      const btns = getButtonsAtPoint(t.clientX, t.clientY);
      touchMap.set(t.identifier, btns);
    }
    syncTouchState();
  }, { passive: false });

  const touchEnd = e => {
    for (const t of e.changedTouches) touchMap.delete(t.identifier);
    syncTouchState();
  };
  document.addEventListener('touchend', touchEnd);
  document.addEventListener('touchcancel', touchEnd);

  // タイトル・結果画面でキャンバスをタップしたら開始/戻る
  canvas.addEventListener('touchstart', e => {
    if (gameState === 'title' || gameState === 'result') {
      pressedKeys.add('f');
    }
  });
}

// =========================================================
// サウンド（WebAudioでBGM・効果音をプロシージャル生成 / 追加ファイル不要）
// =========================================================
function mtof(m) { return 440 * Math.pow(2, (m - 69) / 12); }

const Sound = (() => {
  let ctx = null, master = null, muted = false;
  let curTrack = null, step = 0, stepTimer = null, stepDur = 0.1;

  function ensure() {
    if (ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    ctx = new AC();
    master = ctx.createGain();
    master.gain.value = muted ? 0.0001 : 0.45;
    master.connect(ctx.destination);
  }
  function resume() {
    ensure();
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  // 単発のオシレータ音（任意で周波数スライド）
  function blip(freq, dur, type, vol, slideTo) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.3, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  // ノイズ（打撃・破壊音）
  function noise(dur, vol, cutoff) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime;
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = cutoff || 1200;
    const g = ctx.createGain(); g.gain.value = vol || 0.4;
    src.connect(lp); lp.connect(g); g.connect(master);
    src.start(t0);
  }

  const sfx = {
    hit:     () => { noise(0.11, 0.5, 1800); blip(240, 0.07, 'square', 0.22, 90); },
    heavy:   () => { noise(0.2, 0.7, 800);  blip(150, 0.16, 'sawtooth', 0.3, 55); },
    block:   () => { noise(0.07, 0.32, 5200); blip(950, 0.05, 'square', 0.14); },
    special: () => { blip(330, 0.16, 'sawtooth', 0.28, 880); blip(550, 0.2, 'square', 0.18, 1320); },
    jump:    () => blip(440, 0.12, 'square', 0.16, 760),
    ko:      () => { noise(0.5, 0.85, 700); blip(180, 0.5, 'sawtooth', 0.34, 38); },
    select:  () => blip(880, 0.05, 'square', 0.18),
    decide:  () => { blip(660, 0.06, 'square', 0.22); blip(990, 0.12, 'square', 0.2, 1320); }
  };

  // BGM：16ステップのループ（MIDIノート、0=休符）
  const TRACKS = {
    title: {                                   // タイトル専用：壮大でゆったり
      bpm: 92,
      bass: [45,0,45,0, 48,0,48,0, 41,0,41,0, 43,0,43,0],
      lead: [76,0,72,0, 81,0,76,0, 72,0,69,0, 74,71,67,0],
      drums: false
    },
    menu: {
      bpm: 100,
      bass: [45,0,0,0, 41,0,0,0, 43,0,0,0, 40,0,0,0],
      lead: [69,0,72,0, 76,0,72,0, 74,0,71,0, 67,0,69,0],
      drums: false
    },
    battle: {
      bpm: 148,
      bass: [33,33,40,33, 36,36,43,36, 31,31,38,31, 28,28,35,28],
      lead: [69,72,76,81, 79,76,72,76, 67,72,76,79, 77,74,72,69],
      drums: true
    }
  };

  function tick() {
    const tr = TRACKS[curTrack];
    if (!tr) return;
    if (!muted) {
      const b = tr.bass[step % tr.bass.length];
      if (b) blip(mtof(b), stepDur * 0.95, 'triangle', 0.26);
      const l = tr.lead[step % tr.lead.length];
      if (l) blip(mtof(l), stepDur * 1.5, 'square', 0.10);
      if (tr.drums) {
        if (step % 4 === 0) noise(0.07, 0.30, 1800);   // キック
        if (step % 2 === 1) noise(0.03, 0.12, 7000);   // ハイハット
      }
    }
    step = (step + 1) % 16;
  }

  function playBgm(name) {
    if (curTrack === name) return;
    stopBgm();
    if (!TRACKS[name]) return;
    curTrack = name; step = 0;
    stepDur = 60 / TRACKS[name].bpm / 4;     // 16分音符
    if (ctx) stepTimer = setInterval(tick, stepDur * 1000);
  }
  function stopBgm() {
    if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
    curTrack = null;
  }
  // ctxがまだ無い状態でplayBgmが呼ばれてもresume後に再生されるよう、毎フレームの要求を保持
  let wanted = null;
  function requestBgm(name) {
    wanted = name;
    if (ctx && curTrack !== name) playBgm(name);
  }
  function toggleMute() {
    muted = !muted;
    if (master) master.gain.value = muted ? 0.0001 : 0.45;
    updateMuteBtn();
    if (!muted) { resume(); if (wanted) playBgm(wanted); }
    return muted;
  }
  function isMuted() { return muted; }

  function updateMuteBtn() {
    const b = document.getElementById('muteBtn');
    if (b) b.textContent = muted ? '🔇' : '🔊';
  }

  return { resume, sfx, requestBgm, toggleMute, isMuted, updateMuteBtn };
})();

// 最初の入力で音声を有効化（ブラウザの自動再生制限対策）
function unlockAudio() { Sound.resume(); }
window.addEventListener('keydown', unlockAudio, { once: false });
window.addEventListener('touchstart', unlockAudio, { passive: true });
window.addEventListener('mousedown', unlockAudio);

// Mキーでミュート切替
window.addEventListener('keydown', e => { if (normKey(e.key) === 'm') Sound.toggleMute(); });

// ミュートボタン
const muteBtn = document.getElementById('muteBtn');
if (muteBtn) {
  muteBtn.addEventListener('click', e => { e.preventDefault(); Sound.resume(); Sound.toggleMute(); });
}

// =========================================================
// 演出（ヒットスパーク・画面シェイク）
// =========================================================
let shake = 0;
const effects = [];
function addShake(v) { shake = Math.min(18, Math.max(shake, v)); }
function spawnSpark(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, s = spread * (0.4 + Math.random() * 0.9);
    effects.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.2,
                   life: 1, color, r: 2 + Math.random() * 3 });
  }
  effects.push({ ring: true, x, y, life: 1, color: '#ffffff' });
}
function updateEffects() {
  for (const e of effects) {
    if (e.ring) { e.life -= 0.10; continue; }
    e.x += e.vx; e.y += e.vy; e.vy += 0.5; e.vx *= 0.92; e.life -= 0.06;
  }
  for (let i = effects.length - 1; i >= 0; i--) if (effects[i].life <= 0) effects.splice(i, 1);
}
function drawEffects() {
  for (const e of effects) {
    if (e.ring) {
      ctx.globalAlpha = Math.max(0, e.life);
      ctx.strokeStyle = e.color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, 6 + (1 - e.life) * 26, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.globalAlpha = Math.max(0, e.life);
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r * e.life + 0.5, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// =========================================================
// キャラ定義
// =========================================================

// =========================================================
// コンボ連携（チェーンキャンセル）
//   ヒット/ガードを当てた通常技は、硬直中に次の技へキャンセルできる。
//   パンチ → キック → 必殺技 の連鎖が基本。必殺技からはキャンセル不可。
// =========================================================
const CHAIN_FROM = {
  punch: { normals: ['kick'], special: true },   // P → K もしくは P → 必殺
  kick:  { normals: [],       special: true }    // K → 必殺のみ
};

// =========================================================
// 飛び道具
// =========================================================
class Projectile {
  constructor(x, y, vx, damage, color, owner) {
    this.x = x; this.y = y; this.vx = vx;
    this.damage = damage; this.color = color;
    this.owner = owner; this.w = 44; this.h = 28;
    this.alive = true; this.frame = 0;
  }
  update() {
    this.x += this.vx;
    this.frame++;
    if (this.x < -60 || this.x > W + 60) this.alive = false;
  }
  hitbox() {
    return { x:this.x-this.w/2, y:this.y-this.h/2, w:this.w, h:this.h,
             move:{ damage:this.damage, hitstun:22, blockstun:14 } };
  }
  draw() {
    ctx.save();
    ctx.shadowColor = this.color; ctx.shadowBlur = 18;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, this.w/2, this.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(this.x - Math.sign(this.vx)*6, this.y - 4, this.w/4, this.h/5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// =========================================================
// Fighter
// =========================================================
class Fighter {
  constructor(charIdx, x, facing, playerKey) {
    const c = CHARACTERS[charIdx];
    this.charIdx = charIdx; this.char = c;
    this.x = x; this.y = GROUND_Y;
    this.vx = 0; this.vy = 0;
    this.facing = facing;
    this.playerKey = playerKey;
    this.maxHp = c.hp; this.hp = c.hp;
    this.state = 'idle';
    this.attackType = null;
    this.attackFrame = 0;
    this.multiHitCounter = 0;
    this.hitstun = 0; this.blockstun = 0; this.hitstop = 0;
    this.crouching = false; this.airborne = false;
    this.hitConnected = false;
    this.inputBuffer = [];
    this.frameCounter = 0;
    this.recvCombo = 0;     // この相手にいま何ヒット連続で当てられているか（受け側）
    this.comboHits = 0;     // 自分が決めている表示中コンボ数（攻め側）
    this.comboTimer = 0;    // コンボ表示の残フレーム
    this.comboPop = 0;      // コンボ数更新時のポップ演出
  }

  get width()  { return this.char.width; }
  get height() { return this.char.height; }

  hurtbox() {
    const h = (this.crouching && !this.airborne) ? this.height * 0.62 : this.height;
    return { x: this.x - this.width/2, y: this.y - h, w: this.width, h: h };
  }

  hitbox() {
    if (this.state !== 'attack') return null;
    const m = MOVES[this.attackType];
    if (!m) return null;
    if (this.attackFrame < m.startup) return null;
    if (this.attackFrame >= m.startup + m.active) return null;
    if (!m.multihit && this.hitConnected) return null;
    const r = m.range;
    const offsetX = this.x + this.facing * (this.width/2 + r.x);
    const left = this.facing === 1 ? offsetX : offsetX - r.w;
    return { x:left, y:this.y - r.y, w:r.w, h:r.h, move:m };
  }

  getDirection() {
    let h = 0, v = 0;
    if (held(this.playerKey, 'left'))  h -= 1;
    if (held(this.playerKey, 'right')) h += 1;
    if (held(this.playerKey, 'down'))  v += 1;
    if (held(this.playerKey, 'up'))    v -= 1;
    if (v > 0 && h < 0) return 1;
    if (v > 0 && h === 0) return 2;
    if (v > 0 && h > 0) return 3;
    if (v === 0 && h < 0) return 4;
    if (v === 0 && h === 0) return 5;
    if (v === 0 && h > 0) return 6;
    if (v < 0 && h < 0) return 7;
    if (v < 0 && h === 0) return 8;
    if (v < 0 && h > 0) return 9;
    return 5;
  }

  pushInputBuffer() {
    const d = this.getDirection();
    const last = this.inputBuffer[this.inputBuffer.length - 1];
    if (!last || last.dir !== d) this.inputBuffer.push({ dir:d, frame:this.frameCounter });
    this.inputBuffer = this.inputBuffer.filter(b => this.frameCounter - b.frame <= 30);
  }

  matchCommand(pattern) {
    const mirror = d => ({ 1:3, 3:1, 4:6, 6:4, 7:9, 9:7, 2:2, 5:5, 8:8 })[d] || d;
    const target = this.facing === 1 ? pattern : pattern.map(mirror);
    let idx = target.length - 1;
    for (let i = this.inputBuffer.length - 1; i >= 0 && idx >= 0; i--) {
      if (this.frameCounter - this.inputBuffer[i].frame > 25) break;
      if (this.inputBuffer[i].dir === target[idx]) idx--;
    }
    return idx < 0;
  }

  startAttack(type) {
    this.state = 'attack';
    this.attackType = type;
    this.attackFrame = 0;
    this.hitConnected = false;
    this.multiHitCounter = 0;
    this.vx = 0;
    if (type !== 'punch' && type !== 'kick') Sound.sfx.special();   // 必殺技の発声
  }

  // 押されたボタン＋コマンド履歴から、出すべき技を決める
  chooseAttack(punchHit, kickHit) {
    const specials = SPECIALS_BY_CHAR[this.char.id] || [];
    for (const sp of specials) {
      if ((sp.button === 'P' && punchHit) || (sp.button === 'K' && kickHit)) {
        if (this.matchCommand(sp.command)) return { move: sp.move, special: true };
      }
    }
    if (punchHit) return { move: 'punch', special: false };
    if (kickHit)  return { move: 'kick',  special: false };
    return null;
  }

  // いまの技から choice の技へキャンセルできるか
  isChainAllowed(fromType, choice) {
    const rule = CHAIN_FROM[fromType];
    if (!rule) return false;                       // 必殺技などからは連携不可
    return choice.special ? rule.special : rule.normals.includes(choice.move);
  }

  update(opponent) {
    this.frameCounter++;
    this.pushInputBuffer();

    if (!this.airborne && this.state !== 'attack' && this.state !== 'hitstun' && this.state !== 'ko') {
      this.facing = (opponent.x > this.x) ? 1 : -1;
    }

    if (this.hitstop > 0) { this.hitstop--; return; }

    if (this.state === 'ko') {
      // 倒れて滑る
      if (this.airborne) {
        this.vy += GRAVITY;
        this.y += this.vy;
        this.x += this.vx;
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y; this.airborne = false; this.vy = 0;
        }
      } else {
        this.vx *= 0.9;
        this.x += this.vx;
      }
      this.clampX();
      return;
    }

    if (this.hitstun > 0) {
      this.hitstun--;
      this.vx *= 0.9;
      if (this.airborne) {
        this.vy += GRAVITY; this.y += this.vy; this.x += this.vx;
        if (this.y >= GROUND_Y) {
          this.y = GROUND_Y; this.airborne = false; this.vy = 0;
          this.hitstun = Math.min(this.hitstun, 10);
        }
      } else this.x += this.vx;
      if (this.hitstun === 0 && !this.airborne) { this.state = 'idle'; this.recvCombo = 0; }
      this.clampX();
      return;
    }

    if (this.blockstun > 0) {
      this.blockstun--;
      this.vx *= 0.85;
      this.x += this.vx;
      if (this.blockstun === 0) this.state = held(this.playerKey, 'down') ? 'crouch' : 'idle';
      this.clampX();
      return;
    }

    if (this.state === 'attack') {
      const m = MOVES[this.attackType];
      // --- チェーンキャンセル：技が当たった後の硬直中なら次の技へ ---
      if (this.hitConnected && this.attackFrame >= m.startup) {
        const ph = pressed(this.playerKey, 'punch');
        const kh = pressed(this.playerKey, 'kick');
        if (ph || kh) {
          const choice = this.chooseAttack(ph, kh);
          if (choice && this.isChainAllowed(this.attackType, choice)) {
            this.startAttack(choice.move);
            return;
          }
        }
      }
      this.attackFrame++;
      if (m.dashMove && this.attackFrame >= m.startup && this.attackFrame < m.startup + m.active) {
        this.vx = this.facing * (this.attackType === 'rapidkick' ? 5 : 6);
      } else this.vx = 0;
      if (m.upward && this.attackFrame === m.startup) {
        this.airborne = true; this.vy = -16; this.vx = this.facing * 2.5;
      }
      if (m.projectile && this.attackFrame === m.startup) {
        projectiles.push(new Projectile(
          this.x + this.facing * 40, this.y - 75,
          this.facing * 9,
          Math.round(m.projDamage * this.char.power),
          m.projColor, this
        ));
      }
      if (m.multihit && this.hitConnected) {
        this.multiHitCounter++;
        if (this.multiHitCounter >= 5) { this.hitConnected = false; this.multiHitCounter = 0; }
      }
      if (this.airborne) {
        this.vy += GRAVITY; this.y += this.vy; this.x += this.vx;
        if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.airborne = false; this.vy = 0; }
      } else this.x += this.vx;
      this.clampX();
      if (this.attackFrame >= m.startup + m.active + m.recovery) {
        this.state = this.airborne ? 'jump' : 'idle';
        this.attackType = null; this.attackFrame = 0;
      }
      return;
    }

    const dir = this.getDirection();
    this.crouching = (dir === 1 || dir === 2 || dir === 3) && !this.airborne;

    const punchHit = pressed(this.playerKey, 'punch');
    const kickHit  = pressed(this.playerKey, 'kick');

    if (punchHit || kickHit) {
      const choice = this.chooseAttack(punchHit, kickHit);
      if (choice) this.startAttack(choice.move);
      return;
    }

    if (this.airborne) {
      this.vy += GRAVITY; this.y += this.vy; this.x += this.vx;
      if (this.y >= GROUND_Y) {
        this.y = GROUND_Y; this.airborne = false; this.vy = 0; this.vx = 0;
        this.state = 'idle';
      }
    } else {
      if (this.crouching) { this.vx = 0; this.state = 'crouch'; }
      else if (dir === 7 || dir === 8 || dir === 9) {
        this.airborne = true;
        this.vy = -this.char.jumpPower;
        if (dir === 7) this.vx = -this.char.speed * 0.75;
        else if (dir === 9) this.vx =  this.char.speed * 0.75;
        else this.vx = 0;
        this.state = 'jump';
        if (this.playerKey !== 'cpu') Sound.sfx.jump();
      } else {
        const mv = held(this.playerKey,'left') ? -1 : held(this.playerKey,'right') ? 1 : 0;
        const backward = (mv === -this.facing);
        this.vx = mv * this.char.speed * (backward ? 0.65 : 1.0);
        this.x += this.vx;
        this.state = mv === 0 ? 'idle' : (backward ? 'back' : 'walk');
      }
    }
    this.clampX();
  }

  clampX() {
    if (this.x < this.width/2 + 6) this.x = this.width/2 + 6;
    if (this.x > W - this.width/2 - 6) this.x = W - this.width/2 - 6;
  }

  takeHit(move, attacker) {
    if (move.lowOnly && this.airborne) return null;
    // ガード成立条件：(逆方向入力) または (ガードボタン)
    const backDir = -this.facing;
    const backHeld = (backDir === -1 && held(this.playerKey, 'left')) ||
                     (backDir === 1  && held(this.playerKey, 'right'));
    const guardBtn = held(this.playerKey, 'guard');
    const canBlock = (backHeld || guardBtn) && !this.airborne && this.state !== 'attack';

    if (canBlock) {
      this.state = 'block';
      this.blockstun = move.blockstun || 12;
      this.hitstop = HIT_STOP;
      if (attacker) attacker.hitstop = HIT_STOP;
      this.vx = -this.facing * 2.5;
      this.recvCombo = 0;               // ガードでコンボは途切れる
      return 'block';
    }
    // コンボ継続判定とダメージ補正（連続ヒットほど減衰）
    const comboing = this.hitstun > 0 || this.state === 'hitstun';
    this.recvCombo = comboing ? this.recvCombo + 1 : 1;
    const prorate = Math.max(0.35, 1 - 0.12 * (this.recvCombo - 1));
    const dmg = Math.max(1, Math.round((move.damage || 0) * (attacker ? attacker.char.power : 1) * prorate));
    this.hp -= dmg;
    this.state = 'hitstun';
    this.hitstun = move.hitstun || 18;
    this.hitstop = HIT_STOP;
    if (attacker) attacker.hitstop = HIT_STOP;
    this.attackType = null; this.attackFrame = 0;
    if (this.airborne) { this.vy = -5; this.vx = -this.facing * 4; }
    else this.vx = -this.facing * 3.5;
    if (this.hp <= 0) {
      this.hp = 0; this.state = 'ko'; this.hitstun = 9999;
      this.vx = -this.facing * 5; this.vy = -8; this.airborne = true;
    }
    return 'hit';
  }

  draw() {
    drawCharacterPose(this.char, this.x, this.y, this.facing, {
      crouching: this.crouching && !this.airborne,
      attackType: this.state === 'attack' ? this.attackType : null,
      attackPhase: this.state === 'attack' ? attackPhase(this) : null,
      jumping: this.airborne,
      hitFlash: this.hitstop > 0 || this.blockstun > 6,
      guarding: this.state === 'block' || (held(this.playerKey,'guard') && !this.airborne && this.state !== 'attack'),
      ko: this.state === 'ko',
      state: this.state
    });
  }
}

function attackPhase(f) {
  const m = MOVES[f.attackType];
  if (!m) return 'idle';
  if (f.attackFrame < m.startup) return 'startup';
  if (f.attackFrame < m.startup + m.active) return 'active';
  return 'recovery';
}

// =========================================================
// CPU AI
// =========================================================
function cpuThink(self, opp) {
  for (const k in cpuState.keys) cpuState.keys[k] = false;

  if (self.state === 'hitstun' || self.state === 'ko' || self.state === 'block' || self.hitstop > 0) return;

  const dist = Math.abs(self.x - opp.x);
  const facing = (opp.x > self.x) ? 1 : -1;
  const closer = facing === 1 ? 'right' : 'left';
  const farther = facing === 1 ? 'left' : 'right';

  // 飛び道具を検知
  const incomingProj = projectiles.find(pr =>
    pr.owner !== self &&
    Math.sign(pr.vx) === -facing &&
    Math.abs(pr.x - self.x) < 320
  );

  // 攻撃中は派生制御のみ
  if (self.state === 'attack') return;

  // 相手の攻撃 or 飛び道具 → ガード or ジャンプ回避
  if (opp.state === 'attack' && dist < 200) {
    if (Math.random() < 0.75) {
      cpuState.keys.guard = true;
      return;
    }
  }
  if (incomingProj) {
    if (Math.random() < 0.5 && !self.airborne) {
      // ジャンプで飛び越える
      cpuState.keys.up = true;
      cpuState.keys[closer] = true;
    } else {
      cpuState.keys.guard = true;
    }
    return;
  }

  // 接近/離脱
  if (dist > 130) {
    cpuState.keys[closer] = true;
  } else if (dist < 55) {
    if (Math.random() < 0.15) cpuState.keys[farther] = true;
  }

  // 近距離なら攻撃を試みる
  if (dist < 100 && cpuState.attackCooldown <= 0) {
    const r = Math.random();
    if (r < 0.04) {
      cpuState.pressed.add('punch');
      cpuState.attackCooldown = 25 + Math.floor(Math.random() * 25);
    } else if (r < 0.07) {
      cpuState.pressed.add('kick');
      cpuState.attackCooldown = 30 + Math.floor(Math.random() * 25);
    }
  }
  if (cpuState.attackCooldown > 0) cpuState.attackCooldown--;

  // たまにジャンプ
  if (!self.airborne && Math.random() < 0.004) {
    cpuState.keys.up = true;
    if (Math.random() < 0.5) cpuState.keys[closer] = true;
  }

  // 距離があるなら稀に飛び道具コマンドを仕込む（リュウのみ実用）
  if (dist > 180 && self.char.id === 'ryu' && Math.random() < 0.01) {
    // 簡易：3フレームかけて 2→3→6→P を投入
    cpuQueueCommand('hadoken');
  }
}

let cpuCommandQueue = [];
function cpuQueueCommand(name) {
  if (name === 'hadoken') {
    cpuCommandQueue = [
      { keys:{down:true}, frames:5 },
      { keys:{down:true, right:true}, frames:5 },
      { keys:{right:true}, frames:3 },
      { keys:{right:true, punch:true}, frames:2, press:'punch' }
    ];
  }
}

function cpuRunQueue(self, opp) {
  if (cpuCommandQueue.length === 0) return false;
  const facing = (opp.x > self.x) ? 1 : -1;
  const step = cpuCommandQueue[0];
  // 入力を facing に応じて反転
  for (const k in step.keys) {
    let mapped = k;
    if (facing === -1) {
      if (k === 'right') mapped = 'left';
      else if (k === 'left') mapped = 'right';
    }
    cpuState.keys[mapped] = true;
  }
  if (step.press) cpuState.pressed.add(step.press);
  step.frames--;
  if (step.frames <= 0) cpuCommandQueue.shift();
  return true;
}

// =========================================================
// キャラ描画
// =========================================================

// hex色を明暗調整（amt>0=明るく / amt<0=暗く）
function adjustColor(hex, amt) {
  let s = String(hex).replace('#', '');
  if (s.length === 3) s = s[0]+s[0]+s[1]+s[1]+s[2]+s[2];
  let r = parseInt(s.substr(0,2),16),
      g = parseInt(s.substr(2,2),16),
      b = parseInt(s.substr(4,2),16);
  const target = amt < 0 ? 0 : 255, t = Math.min(1, Math.abs(amt));
  r = Math.round(r + (target-r)*t);
  g = Math.round(g + (target-g)*t);
  b = Math.round(b + (target-b)*t);
  return 'rgb('+r+','+g+','+b+')';
}

// 2関節の手足（付け根→関節→先端）を縁取り付きで描く
function drawLimb(x1,y1,x2,y2,x3,y3,lw,color,outline) {
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = outline; ctx.lineWidth = lw + 3;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3);
  ctx.stroke();
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3);
  ctx.stroke();
}

function drawCharacterPoseProcedural(c, cx, cy, facing, opt) {
  opt = opt || {};
  const col = c.color;
  const w = c.width, h = c.height;
  const headR = w * 0.34;
  const crouchScale = opt.crouching ? 0.62 : 1;
  const bodyH = h * 0.5 * crouchScale;
  const legH  = h * 0.42 * crouchScale;
  const bodyTopY = cy - bodyH - legH;
  const headY = bodyTopY - headR + 4;
  const hipY  = cy - legH;

  // 派生色（陰影・縁取り用）
  const outline   = adjustColor(col.body, -0.55);
  const bodyDark  = adjustColor(col.body, -0.26);
  const bodyLight = adjustColor(col.body,  0.22);
  const skinDark  = adjustColor(col.head, -0.20);
  const lineWBase = c.id === 'monster' ? 13 : 10;
  const atk = opt.attackType, phase = opt.attackPhase;
  const kickActive = atk === 'kick' && phase === 'active';
  const footLift = opt.jumping ? legH * 0.32 : 0;
  const shY = bodyTopY + bodyH * 0.20;

  // 拳を描く小ヘルパ
  const hand = (x,y) => {
    ctx.fillStyle = outline;
    ctx.beginPath(); ctx.arc(x,y,w*0.135+1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = col.head;
    ctx.beginPath(); ctx.arc(x,y,w*0.135,0,Math.PI*2); ctx.fill();
  };

  ctx.save();
  ctx.lineJoin = 'round';

  // 影（KO時以外）
  if (!opt.ko) {
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    ctx.beginPath();
    ctx.ellipse(cx, GROUND_Y + 6, w*0.72, 7, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.translate(cx, cy);
    ctx.rotate(-facing * Math.PI/2 * 0.9);
    ctx.translate(-cx, -cy);
  }

  // ===== 後ろ脚 =====
  drawLimb(
    cx - facing*w*0.16, hipY,
    cx - facing*w*(0.06 + (opt.jumping?0.14:0)), hipY + legH*0.50 - footLift*0.5,
    cx - facing*w*0.30, cy - footLift,
    lineWBase, bodyDark, outline);
  ctx.fillStyle = col.belt;
  ctx.beginPath();
  ctx.ellipse(cx - facing*w*0.30 + facing*4, cy - footLift, w*0.20, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // ===== 前脚 =====
  if (kickActive) {
    drawLimb(
      cx + facing*w*0.04, hipY,
      cx + facing*w*0.55, cy - legH*0.62,
      cx + facing*w*1.10, cy - legH*0.42,
      lineWBase, col.body, outline);
    ctx.fillStyle = col.belt;
    ctx.beginPath();
    ctx.ellipse(cx + facing*w*1.10, cy - legH*0.42, w*0.20, 7, facing*0.5, 0, Math.PI*2);
    ctx.fill();
  } else {
    drawLimb(
      cx + facing*w*0.14, hipY,
      cx + facing*w*(0.24 + (opt.jumping?0.06:0)), hipY + legH*0.50 - footLift*0.5,
      cx + facing*w*0.22, cy - footLift,
      lineWBase, col.body, outline);
    ctx.fillStyle = col.belt;
    ctx.beginPath();
    ctx.ellipse(cx + facing*w*0.22 + facing*4, cy - footLift, w*0.20, 6, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ===== 後ろ腕（胴より先に描いて奥行きを出す） =====
  if (!opt.guarding) {
    drawLimb(cx - facing*w*0.02, shY,
             cx - facing*w*0.30, shY + bodyH*0.34,
             cx - facing*w*0.30, shY + bodyH*0.60,
             lineWBase*0.82, bodyDark, outline);
    hand(cx - facing*w*0.30, shY + bodyH*0.60);
  }

  // ===== 胴体（台形＋左右グラデで立体感） =====
  const topW = w*0.94, botW = w*0.76;
  const tg = ctx.createLinearGradient(cx-w/2, 0, cx+w/2, 0);
  tg.addColorStop(0, facing===1 ? bodyDark : bodyLight);
  tg.addColorStop(0.5, col.body);
  tg.addColorStop(1, facing===1 ? bodyLight : bodyDark);
  ctx.beginPath();
  ctx.moveTo(cx - topW/2, bodyTopY);
  ctx.lineTo(cx + topW/2, bodyTopY);
  ctx.lineTo(cx + botW/2, bodyTopY + bodyH);
  ctx.lineTo(cx - botW/2, bodyTopY + bodyH);
  ctx.closePath();
  ctx.fillStyle = tg; ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 2.5; ctx.stroke();
  // 襟
  ctx.fillStyle = col.accent;
  ctx.beginPath();
  ctx.moveTo(cx - topW/2, bodyTopY);
  ctx.lineTo(cx + topW/2, bodyTopY);
  ctx.lineTo(cx + topW/2 - 7, bodyTopY + bodyH*0.17);
  ctx.lineTo(cx - topW/2 + 7, bodyTopY + bodyH*0.17);
  ctx.closePath();
  ctx.fill();
  // 道着の合わせ目
  ctx.strokeStyle = bodyDark; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, bodyTopY + bodyH*0.17);
  ctx.lineTo(cx + facing*botW*0.16, bodyTopY + bodyH*0.62);
  ctx.stroke();
  // ベルト＋結び目
  ctx.fillStyle = col.belt;
  ctx.fillRect(cx - botW/2 - 2, bodyTopY + bodyH*0.66, botW + 4, bodyH*0.16);
  ctx.beginPath();
  ctx.arc(cx - facing*botW*0.22, bodyTopY + bodyH*0.74, w*0.10, 0, Math.PI*2);
  ctx.fill();

  // ===== 頭 =====
  // 首
  ctx.strokeStyle = skinDark; ctx.lineWidth = w*0.24; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, bodyTopY + 2);
  ctx.lineTo(cx, headY + headR*0.6);
  ctx.stroke();
  // 頭本体
  const hg = ctx.createLinearGradient(cx-headR, 0, cx+headR, 0);
  hg.addColorStop(0, facing===1 ? skinDark : adjustColor(col.head,0.18));
  hg.addColorStop(1, facing===1 ? adjustColor(col.head,0.18) : skinDark);
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(cx, headY, headR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = outline; ctx.lineWidth = 2; ctx.stroke();

  // 髪・装備（キャラ別）
  if (c.id === 'ryu') {
    ctx.fillStyle = '#241a12';
    ctx.beginPath();
    ctx.arc(cx, headY - headR*0.22, headR*0.98, Math.PI*1.04, Math.PI*1.96);
    ctx.fill();
    ctx.fillStyle = col.accent;
    ctx.fillRect(cx - headR, headY - headR*0.46, headR*2, headR*0.34);
    ctx.beginPath();
    ctx.moveTo(cx - facing*headR*0.95, headY - headR*0.40);
    ctx.lineTo(cx - facing*headR*2.1, headY - headR*0.72);
    ctx.lineTo(cx - facing*headR*2.0, headY - headR*0.12);
    ctx.closePath(); ctx.fill();
  } else if (c.id === 'chun') {
    ctx.fillStyle = '#3a2a1a';
    ctx.beginPath();
    ctx.arc(cx, headY - headR*0.18, headR*0.97, Math.PI*0.96, Math.PI*2.04);
    ctx.fill();
    for (const sx of [-1,1]) {
      ctx.fillStyle = '#3a2a1a';
      ctx.beginPath();
      ctx.arc(cx + sx*headR*0.92, headY - headR*0.82, headR*0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = col.accent;
      ctx.beginPath();
      ctx.arc(cx + sx*headR*0.92, headY - headR*0.82, headR*0.2, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (c.id === 'monster') {
    ctx.fillStyle = col.accent;
    ctx.strokeStyle = outline; ctx.lineWidth = 2;
    for (const sx of [-1,1]) {
      ctx.beginPath();
      ctx.moveTo(cx + sx*headR*0.5, headY - headR*0.5);
      ctx.lineTo(cx + sx*headR*1.3, headY - headR*1.7);
      ctx.lineTo(cx + sx*headR*0.95, headY - headR*0.3);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  } else if (c.id === 'samurai') {
    ctx.fillStyle = '#15151c';
    ctx.beginPath();
    ctx.arc(cx, headY, headR*1.08, Math.PI, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx, headY - headR*0.05, headR*1.3, headR*0.42, 0, 0, Math.PI);
    ctx.fill();
    ctx.fillStyle = '#e8c45a';
    ctx.beginPath();
    ctx.arc(cx, headY - headR*0.85, headR*0.58, Math.PI*1.15, Math.PI*1.85);
    ctx.lineTo(cx, headY - headR*0.7);
    ctx.closePath(); ctx.fill();
  }

  // 顔
  if (opt.ko) {
    ctx.strokeStyle = '#1a1a2a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for (const sx of [-1,1]) {
      const ex = cx + sx*headR*0.34, ey = headY + headR*0.05, r = headR*0.17;
      ctx.beginPath();
      ctx.moveTo(ex-r,ey-r); ctx.lineTo(ex+r,ey+r);
      ctx.moveTo(ex+r,ey-r); ctx.lineTo(ex-r,ey+r);
      ctx.stroke();
    }
  } else {
    const eyeX = cx + facing*headR*0.30;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(eyeX, headY + headR*0.04, headR*0.22, headR*0.27, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = (c.id==='monster') ? '#ffec3d' : '#1a1a2a';
    ctx.beginPath();
    ctx.arc(eyeX + facing*headR*0.07, headY + headR*0.06, headR*0.12, 0, Math.PI*2);
    ctx.fill();
    if (c.id==='monster') {
      ctx.shadowColor = '#ffec3d'; ctx.shadowBlur = 8;
      ctx.fill(); ctx.shadowBlur = 0;
    }
    // 眉（攻撃中は怒り眉）
    ctx.strokeStyle = (c.id==='ryu') ? '#241a12'
                    : (c.id==='chun') ? '#3a2a1a' : outline;
    ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    if (atk) {
      ctx.moveTo(cx + facing*headR*0.04, headY - headR*0.26);
      ctx.lineTo(cx + facing*headR*0.62, headY - headR*0.04);
    } else {
      ctx.moveTo(cx + facing*headR*0.06, headY - headR*0.30);
      ctx.lineTo(cx + facing*headR*0.60, headY - headR*0.32);
    }
    ctx.stroke();
    // 口
    ctx.strokeStyle = skinDark; ctx.lineWidth = 2.5;
    ctx.beginPath();
    if (atk && phase==='active') {
      ctx.arc(cx + facing*headR*0.28, headY + headR*0.52, headR*0.15, 0, Math.PI*2);
    } else {
      ctx.moveTo(cx + facing*headR*0.06, headY + headR*0.52);
      ctx.lineTo(cx + facing*headR*0.44, headY + headR*0.52);
    }
    ctx.stroke();
    // 怪物の牙
    if (c.id==='monster') {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(cx + facing*headR*0.08, headY + headR*0.44);
      ctx.lineTo(cx + facing*headR*0.24, headY + headR*0.80);
      ctx.lineTo(cx + facing*headR*0.34, headY + headR*0.44);
      ctx.closePath(); ctx.fill();
    }
  }

  // ===== 前腕 / ガード =====
  const armW = lineWBase*0.82;
  if (opt.guarding) {
    drawLimb(cx, shY, cx + facing*w*0.34, shY + bodyH*0.30,
             cx + facing*w*0.46, shY + bodyH*0.06, armW, bodyDark, outline);
    hand(cx + facing*w*0.46, shY + bodyH*0.06);
    drawLimb(cx, shY + bodyH*0.18, cx + facing*w*0.30, shY + bodyH*0.12,
             cx + facing*w*0.48, shY + bodyH*0.46, armW, col.body, outline);
    hand(cx + facing*w*0.48, shY + bodyH*0.46);
    ctx.strokeStyle = 'rgba(120,180,255,0.8)'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx + facing*w*0.42, shY + bodyH*0.28, w*0.66, -Math.PI*0.55, Math.PI*0.55);
    ctx.stroke();
  } else {
    let elX = cx + facing*w*0.30, elY = shY + bodyH*0.20;
    let haX = cx + facing*w*0.46, haY = shY + bodyH*0.34;
    const punching = phase==='active' &&
      (atk==='punch'||atk==='shoryuken'||atk==='charge'||
       atk==='iai'||atk==='counter'||atk==='hadoken');
    if (punching) {
      elX = cx + facing*w*0.60; elY = shY + bodyH*0.08;
      haX = cx + facing*w*1.18; haY = shY + bodyH*0.04;
    }
    if (atk==='shoryuken' && phase==='active') {
      elX = cx + facing*w*0.32; elY = shY - bodyH*0.32;
      haX = cx + facing*w*0.52; haY = shY - bodyH*1.05;
    }
    if (atk==='hadoken' && phase==='startup') {
      elX = cx + facing*w*0.10; elY = shY + bodyH*0.30;
      haX = cx + facing*w*0.18; haY = shY + bodyH*0.42;
    } else if (atk==='hadoken' && phase==='active') {
      elX = cx + facing*w*0.55; elY = shY + bodyH*0.16;
      haX = cx + facing*w*1.05; haY = shY + bodyH*0.22;
    }
    drawLimb(cx, shY, elX, elY, haX, haY, armW, col.body, outline);
    // 波動拳の溜め／放出光
    if (atk==='hadoken') {
      ctx.fillStyle = MOVES.hadoken.projColor;
      ctx.shadowColor = MOVES.hadoken.projColor;
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(haX, haY, w*0.18, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      hand(haX, haY);
    }
  }

  // ===== 武士の刀 =====
  if (c.id === 'samurai') {
    if (atk==='iai' && phase==='active') {
      const x1 = cx + facing*w*0.5, y1 = shY + bodyH*0.12;
      const x2 = cx + facing*(w*0.5 + 135), y2 = shY - bodyH*0.05;
      ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 12; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.strokeStyle = '#eef2f6'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    } else {
      ctx.strokeStyle = '#5a3b22'; ctx.lineWidth = 6; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - facing*w*0.1, bodyTopY + bodyH*0.78);
      ctx.lineTo(cx - facing*w*0.85, bodyTopY + bodyH*1.05);
      ctx.stroke();
    }
  }

  // 被弾フラッシュ
  if (opt.hitFlash && Math.floor(performance.now()/50)%2===0) {
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(cx, headY + h*0.35, w*0.95, h*0.62, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }
  ctx.restore();
}

// =========================================================
// スプライト（Blender生成）描画
// =========================================================
// build_sprites.py のカメラ設定と一致させた諸元
const SPR_W = 512, SPR_H = 640;
const SPR_FOOT = 576;       // 地面(z=0)に対応するPNGの行
const SPR_CENTER = 256;     // 中心(x=0)に対応するPNGの列
const SPRITE_SCALE = 0.34;  // PNGピクセル→ゲーム座標 の倍率

// 各キャラが持つポーズ（build_sprites.py の render と一致）
const CHAR_POSES = {
  ryu:     ['idle','walk','crouch','jump','guard','hit','punch','kick','hadoken','shoryuken'],
  chun:    ['idle','walk','crouch','jump','guard','hit','punch','kick','rapidkick','airdash'],
  monster: ['idle','walk','crouch','jump','guard','hit','punch','kick','charge','quake'],
  samurai: ['idle','walk','crouch','jump','guard','hit','punch','kick','iai','counter'],
  hideki:  ['idle','walk','crouch','jump','guard','hit','punch','kick','seiken','mawashi'],
  yuzu:    ['idle','walk','crouch','jump','guard','hit','punch','kick','totsugeki','oonara'],
  sakura:  ['idle','walk','crouch','jump','guard','hit','punch','kick','tobikakari','oshikko'],
  boss:    ['idle','walk','crouch','jump','guard','hit','punch','kick','flame','tailsweep']
};

// スプライト先読み
const SPRITES = {};
for (const id in CHAR_POSES) {
  SPRITES[id] = {};
  for (const pose of CHAR_POSES[id]) {
    const img = new Image();
    img.src = 'sprites/' + id + '/' + id + '_' + pose + '.png';
    SPRITES[id][pose] = img;
  }
}

// ゲーム状態 → ポーズ名
function poseFor(c, opt) {
  if (opt.attackType) {
    return (SPRITES[c.id] && SPRITES[c.id][opt.attackType]) ? opt.attackType : 'punch';
  }
  if (opt.ko) return 'hit';
  if (opt.guarding || opt.state === 'block') return 'guard';
  if (opt.state === 'hitstun') return 'hit';
  if (opt.jumping || opt.state === 'jump') return 'jump';
  if (opt.crouching || opt.state === 'crouch') return 'crouch';
  if (opt.state === 'walk' || opt.state === 'back') return 'walk';
  return 'idle';
}

// キャラ描画（スプライト優先・未読込はベクター描画にフォールバック）
function drawCharacterPose(c, cx, cy, facing, opt) {
  opt = opt || {};
  const set = SPRITES[c.id];
  const img = set ? set[poseFor(c, opt)] : null;
  if (!img || !img.complete || img.naturalWidth === 0) {
    drawCharacterPoseProcedural(c, cx, cy, facing, opt);
    return;
  }
  // 影
  if (!opt.ko) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx, GROUND_Y + 6, c.width * 0.72 * (opt.scale || 1), 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  const dw = SPR_W * SPRITE_SCALE, dh = SPR_H * SPRITE_SCALE;
  const ax = (SPR_CENTER / SPR_W) * dw;   // 中心・足元アンカー
  const ay = (SPR_FOOT / SPR_H) * dh;
  ctx.save();
  ctx.translate(cx, cy);
  const drawSc = (opt.scale || 1) * (c.drawScale || 1);
  if (drawSc !== 1) ctx.scale(drawSc, drawSc);
  if (facing === -1) ctx.scale(-1, 1);
  if (opt.ko) ctx.rotate(-Math.PI / 2 * 0.92);   // 倒れる
  ctx.drawImage(img, -ax, -ay, dw, dh);
  if (opt.hitFlash && Math.floor(performance.now() / 50) % 2 === 0) {
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillRect(-ax, -ay, dw, dh);
  }
  ctx.restore();
}

// =========================================================
// ゲーム状態
// =========================================================
let gameState = 'title';
let selectStep = 0;
let selectCursor = [0, 0];
let selectedStage = 0;
let stageCursor = 0;
let players = [null, null];
let projectiles = [];
let timer = 60 * 60;
let resultDelay = 0;
let winnerText = '';
const SELECTABLE = 7;          // 選択可能キャラ数（ボスは選択不可）
let arcadeQueue = [];          // 1Pモードの対戦相手の並び
let stageQueue = [];           // 通常戦のステージ巡回順（シャッフル）
let arcadeRound = 0;           // 現在の対戦数（0始まり）
let lastResult = '';           // 'win' / 'lose' / 'clear'
let continues = 3;             // コンティニュー残数
let titleBlink = 0;

const MODES = ['アーケードモード'];   // 1Pアーケードのみ
let modeIndex = 0;
let isCpuMode = true;

// =========================================================
// 戦闘開始
// =========================================================
function startBattle() {
  const p1 = new Fighter(selectCursor[0], 280, 1, 'p1');
  const p2 = new Fighter(selectCursor[1], W - 280, -1, isCpuMode ? 'cpu' : 'p2');
  players = [p1, p2];
  projectiles = [];
  timer = 60 * 60;
  resultDelay = 0;
  winnerText = '';
  cpuCommandQueue = [];
  cpuState.attackCooldown = 0;
  gameState = 'battle';
}

// 次の対戦を開始（背景はラウンドごとに巡回）
function startNextFight() {
  selectCursor[1] = arcadeQueue[arcadeRound];
  const isBoss = arcadeRound >= arcadeQueue.length - 1;
  selectedStage = isBoss ? STAGES.length - 1            // ボスは洞窟
                         : stageQueue[arcadeRound % stageQueue.length];
  startBattle();
}

// アーケード開始：自分以外の6キャラ＋ボスを並べる
function startArcade() {
  arcadeQueue = [];
  continues = 3;
  for (let i = 0; i < SELECTABLE; i++) {
    if (i !== selectCursor[0]) arcadeQueue.push(i);
  }
  arcadeQueue.push(7);            // 最後はボス（CHARACTERS[7]）
  arcadeRound = 0;
  // 通常戦のステージをシャッフル（全ステージが必ず出るように）
  stageQueue = [];
  for (let i = 0; i < STAGES.length - 1; i++) stageQueue.push(i);
  stageQueue.sort(() => Math.random() - 0.5);
  startNextFight();
}

// 対戦終了：勝敗とラウンドから次の状態を決める
function endFight(playerWon) {
  if (playerWon) {
    lastResult = (arcadeRound >= arcadeQueue.length - 1) ? 'clear' : 'win';
    gameState = 'result';
  } else if (continues > 0) {
    gameState = 'continue';
  } else {
    lastResult = 'lose';
    gameState = 'result';
  }
}

function rectOverlap(a, b) {
  if (!a || !b) return false;
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateBattle() {
  const [p1, p2] = players;
  if (isCpuMode) {
    if (!cpuRunQueue(p2, p1)) cpuThink(p2, p1);
  }
  p1.update(p2);
  p2.update(p1);
  projectiles.forEach(pr => pr.update());
  checkHit(p1, p2); checkHit(p2, p1);
  projectiles = projectiles.filter(pr => {
    if (!pr.alive) return false;
    const target = pr.owner === p1 ? p2 : p1;
    if (rectOverlap(pr.hitbox(), target.hurtbox())) {
      const res = target.takeHit(pr.hitbox().move, pr.owner);
      const cx = pr.x, cy = target.y - target.height * 0.5;
      if (res === 'block') { spawnSpark(cx, cy, '#74c0fc', 7, 3); Sound.sfx.block(); addShake(2); }
      else if (res === 'hit') {
        spawnSpark(cx, cy, '#4dabf7', 14, 5); Sound.sfx.heavy(); addShake(5);
        pr.owner.comboHits = target.recvCombo; pr.owner.comboTimer = 80; pr.owner.comboPop = 9;
      }
      pr.alive = false; return false;
    }
    return true;
  });
  // 押し合い
  if (Math.abs(p1.x - p2.x) < (p1.width + p2.width)/2 - 4 && !p1.airborne && !p2.airborne) {
    const overlap = (p1.width + p2.width)/2 - Math.abs(p1.x - p2.x);
    const sign = p1.x < p2.x ? -1 : 1;
    p1.x += sign * overlap/2; p2.x -= sign * overlap/2;
    p1.clampX(); p2.clampX();
  }
  // 演出更新
  updateEffects();
  if (shake > 0) shake = Math.max(0, shake - 0.8);
  for (const p of players) {
    if (p.comboTimer > 0) p.comboTimer--;
    if (p.comboPop > 0) p.comboPop--;
  }

  const koSide = p1.hp <= 0 ? 1 : p2.hp <= 0 ? 2 : 0;
  if (koSide && resultDelay === 0) {
    resultDelay = 120;
    winnerText = koSide === 2 ? `1P ${p1.char.name} の勝ち！` :
                 isCpuMode ? `CPU ${p2.char.name} の勝ち！` : `2P ${p2.char.name} の勝ち！`;
    Sound.sfx.ko();
    addShake(16);
    const loser = koSide === 1 ? p1 : p2;
    spawnSpark(loser.x, loser.y - loser.height * 0.5, '#ffd43b', 24, 8);
  }
  if (resultDelay > 0) {
    resultDelay--;
    if (resultDelay === 0) endFight(p1.hp > 0);
  } else {
    timer--;
    if (timer <= 0) endFight(p1.hp >= p2.hp);
  }
}

function checkHit(attacker, defender) {
  const hb = attacker.hitbox();
  if (!hb) return;
  if (rectOverlap(hb, defender.hurtbox())) {
    const result = defender.takeHit(hb.move, attacker);
    if (result === 'hit' || result === 'block') attacker.hitConnected = true;
    const cx = (attacker.x + defender.x) / 2;
    if (result === 'hit') {
      const heavy = (hb.move.damage || 0) >= 14;
      const cy = defender.y - defender.height * 0.55;
      spawnSpark(cx, cy, heavy ? '#ff8f3f' : '#ffe066', heavy ? 16 : 9, heavy ? 6 : 4);
      addShake(heavy ? 7 : 3.5);
      heavy ? Sound.sfx.heavy() : Sound.sfx.hit();
      // コンボ表示は攻め側に記録
      attacker.comboHits = defender.recvCombo;
      attacker.comboTimer = 80;
      attacker.comboPop = 9;
    } else if (result === 'block') {
      spawnSpark(cx, defender.y - defender.height * 0.5, '#74c0fc', 6, 3);
      addShake(2);
      Sound.sfx.block();
    }
  }
}

  for (const [gx, gy, gr] of [[W*0.5,160,240],[W*0.16,250,150],[W*0.84,240,150]]) {

// ステージ選択画面
function drawStageSelect() {
  ctx.fillStyle = '#1a1a26'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('ステージ選択', W/2, 56);
  ctx.font = '16px sans-serif'; ctx.fillStyle = '#4dabf7';
  ctx.fillText('▼ 1P が選択中 ▼', W/2, 88);
  const cardW = 264, cardH = 168, gap = 30;
  const totalW = cardW*STAGES.length + gap*(STAGES.length-1);
  const startX = (W - totalW)/2, cardY = 150;
  STAGES.forEach((s, i) => {
    const cx = startX + i*(cardW+gap);
    ctx.save();
    ctx.beginPath(); ctx.rect(cx, cardY, cardW, cardH); ctx.clip();
    ctx.translate(cx, cardY); ctx.scale(cardW/W, cardH/H);
    s.draw();
    ctx.restore();
    if (stageCursor === i) {
      ctx.strokeStyle = '#4dabf7'; ctx.lineWidth = 4;
      ctx.strokeRect(cx-2, cardY-2, cardW+4, cardH+4);
    } else {
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
      ctx.strokeRect(cx, cardY, cardW, cardH);
    }
    ctx.fillStyle = stageCursor === i ? '#fff' : '#999';
    ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(s.name, cx + cardW/2, cardY + cardH + 34);
  });
  ctx.fillStyle = '#888'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(isTouch ? '◀▶ で選択 → P で決定' : 'A / D で選択 → F で決定', W/2, H-36);
}

function updateStageSelect() {
  const n = STAGES.length;
  if (pressed('p1','left'))  { stageCursor = (stageCursor + n - 1) % n; Sound.sfx.select(); }
  if (pressed('p1','right')) { stageCursor = (stageCursor + 1) % n; Sound.sfx.select(); }
  if (pressed('p1','punch')) { Sound.sfx.decide(); selectedStage = stageCursor; startBattle(); }
}

function drawBattle() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()*2-1)*shake, (Math.random()*2-1)*shake);
  STAGES[selectedStage].draw();
  projectiles.forEach(pr => pr.draw());
  [...players].sort((a,b)=>a.y-b.y).forEach(p => p.draw());
  drawEffects();
  ctx.restore();
  drawUI();
  if (resultDelay > 0) drawKoBanner();
}

function drawKoBanner() {
  ctx.save();
  ctx.textAlign = 'center';
  const pulse = 1 + 0.07 * Math.sin(performance.now() / 80);
  ctx.translate(W / 2, H / 2 - 10);
  ctx.scale(pulse, pulse);
  ctx.font = 'bold 118px sans-serif';
  ctx.lineWidth = 9; ctx.strokeStyle = '#000';
  ctx.shadowColor = '#ff3b3b'; ctx.shadowBlur = 30;
  ctx.strokeText('K.O.', 0, 0);
  ctx.fillStyle = '#fa5252'; ctx.fillText('K.O.', 0, 0);
  ctx.restore();
}

function drawUI() {
  drawHpBar(40, 30, 360, 22, players[0].hp, players[0].maxHp, true, players[0].char.name, '1P');
  drawHpBar(W-40-360, 30, 360, 22, players[1].hp, players[1].maxHp, false, players[1].char.name, isCpuMode ? 'CPU' : '2P');
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  const t = Math.max(0, Math.ceil(timer/60));
  ctx.strokeText(t, W/2, 52); ctx.fillText(t, W/2, 52);
  // アーケードの進行表示
  ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = '#ffd43b';
  const isBoss = arcadeRound >= arcadeQueue.length - 1;
  ctx.fillText(isBoss ? 'BOSS戦' : `${arcadeRound + 1} / ${arcadeQueue.length} 戦`, W/2, 74);

  // コンボカウンタ（攻め側に表示）
  players.forEach((p, i) => {
    if (p.comboTimer > 0 && p.comboHits >= 2) {
      const x = i === 0 ? 156 : W - 156, y = 150;
      const pop = 1 + (p.comboPop || 0) * 0.05;
      ctx.save();
      ctx.translate(x, y); ctx.scale(pop, pop); ctx.textAlign = 'center';
      ctx.lineWidth = 5; ctx.strokeStyle = '#000';
      ctx.font = 'bold 44px sans-serif';
      ctx.strokeText(p.comboHits, 0, 0);
      ctx.fillStyle = '#ffd43b'; ctx.fillText(p.comboHits, 0, 0);
      ctx.font = 'bold 18px sans-serif';
      ctx.strokeText('HITS', 0, 24);
      ctx.fillStyle = '#fff'; ctx.fillText('HITS', 0, 24);
      ctx.restore();
    }
  });
}

function drawHpBar(x,y,w,h,hp,maxHp,leftToRight,name,label) {
  const ratio = Math.max(0, hp/maxHp);
  ctx.fillStyle = '#222'; ctx.fillRect(x,y,w,h);
  let col = '#ffd43b';
  if (ratio < 0.5) col = '#ffa94d';
  if (ratio < 0.25) col = '#fa5252';
  ctx.fillStyle = col;
  const fillW = w*ratio;
  if (leftToRight) ctx.fillRect(x,y,fillW,h);
  else ctx.fillRect(x+w-fillW,y,fillW,h);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = leftToRight ? 'left' : 'right';
  ctx.fillText(`${label}  ${name}`, leftToRight ? x : x+w, y+h+16);
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = leftToRight ? 'right' : 'left';
  ctx.fillText(`${hp} / ${maxHp}`, leftToRight ? x+w : x, y-4);
}

  ctx.fillText('格闘ゲーム', W/2, 170);
  ctx.font = 'bold 18px sans-serif'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffcc66'; ctx.fillText('FIGHTING PROTOTYPE', W/2, 205);
  ctx.shadowBlur = 0;

  // モード選択
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#888';
  ctx.fillText('モード選択', W/2, 270);
  ctx.font = 'bold 30px sans-serif';
  MODES.forEach((m, i) => {
    const y = 310 + i * 50;
    if (i === modeIndex) {
      ctx.fillStyle = '#ffd43b';
      ctx.shadowColor = '#ff6b00'; ctx.shadowBlur = 15;
      ctx.fillText('▶ ' + m + ' ◀', W/2, y);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#666';
      ctx.fillText(m, W/2, y);
    }
  });

  titleBlink++;
  if (Math.floor(titleBlink/30) % 2 === 0) {
    ctx.font = 'bold 18px sans-serif';
    ctx.fillStyle = '#ffd43b';
    ctx.fillText(isTouch ? 'タップして開始 / ▲▼ でモード切替' : 'F または スペース で開始 / W S でモード切替', W/2, H - 35);
  }
}

function updateTitle() {
  if (pressedKeys.has('arrowup') || pressedKeys.has('w')) modeIndex = Math.max(0, modeIndex - 1);
  if (pressedKeys.has('arrowdown') || pressedKeys.has('s')) modeIndex = Math.min(MODES.length - 1, modeIndex + 1);
  if (pressedKeys.has(' ') || pressedKeys.has('enter') || pressedKeys.has('f') || pressedKeys.has('j')) {
    Sound.sfx.decide();
    isCpuMode = true;
    gameState = 'select';
    selectStep = 0;
    selectCursor = [0, 0];
  }
}

  ctx.fillText('キャラクター選択', W/2, 50);
  ctx.font = '18px sans-serif';
  if (selectStep === 0) {
    ctx.fillStyle = '#4dabf7';
    ctx.fillText('▼ 1P が選択中 ▼', W/2, 84);
  } else {
    ctx.fillStyle = '#f06595';
    ctx.fillText(isCpuMode ? '▼ CPU を選択中 ▼' : '▼ 2P が選択中 ▼', W/2, 84);
  }

  const n = SELECTABLE;
  const gap = 16, cardH = 290, cardY = 120;
  const cardW = Math.min(200, Math.floor((W - 48 - gap*(n-1)) / n));
  const totalW = cardW*n + gap*(n-1);
  const startX = (W - totalW)/2;

  CHARACTERS.slice(0, SELECTABLE).forEach((c,i) => {
    const cx = startX + i*(cardW+gap);
    ctx.fillStyle = '#252535'; ctx.fillRect(cx, cardY, cardW, cardH);
    if (selectStep === 1 && selectCursor[0] === i) {
      ctx.fillStyle = 'rgba(77,171,247,0.25)';
      ctx.fillRect(cx, cardY, cardW, cardH);
    }
    if (selectCursor[selectStep] === i) {
      ctx.strokeStyle = selectStep === 0 ? '#4dabf7' : '#f06595';
      ctx.lineWidth = 4; ctx.strokeRect(cx-2, cardY-2, cardW+4, cardH+4);
    } else {
      ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.strokeRect(cx, cardY, cardW, cardH);
    }
    const pvScale = Math.min(1, (cardW - 12) / (SPR_W * SPRITE_SCALE));
    drawCharacterPose(c, cx + cardW/2, cardY + cardH - 84, 1, { scale: pvScale });
    if (selectStep === 1 && selectCursor[0] === i) {
      ctx.fillStyle = '#4dabf7'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('1P', cx+10, cardY+24);
    }
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    let nf = 15;                                   // 長い名前はカード幅に収める
    ctx.font = 'bold ' + nf + 'px sans-serif';
    while (ctx.measureText(c.name).width > cardW - 8 && nf > 9) {
      nf--; ctx.font = 'bold ' + nf + 'px sans-serif';
    }
    ctx.fillText(c.name, cx + cardW/2, cardY + 28);
    ctx.font = '11px sans-serif'; ctx.fillStyle = '#aaa';
    ctx.fillText(c.desc, cx + cardW/2, cardY + 48);
    ctx.fillStyle = '#ffd43b'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`HP   ${c.hp}`,             cx+16, cardY+cardH-50);
    ctx.fillText(`速度  ${c.speed.toFixed(1)}`, cx+16, cardY+cardH-34);
    ctx.fillText(`攻撃力 ${c.power.toFixed(2)}`, cx+16, cardY+cardH-18);
  });

  ctx.fillStyle = '#888'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
  if (selectStep === 0) {
    ctx.fillText(isTouch ? '◀▶ で選択 → P で決定' : '1P：A/D で選択 → F で決定', W/2, H-30);
  } else {
    ctx.fillText('2P：← / → で選択 → J で決定', W/2, H-30);
  }
}

function updateSelect() {
  const n = SELECTABLE;
  if (pressed('p1','left'))  { selectCursor[0] = (selectCursor[0]+n-1)%n; Sound.sfx.select(); }
  if (pressed('p1','right')) { selectCursor[0] = (selectCursor[0]+1)%n; Sound.sfx.select(); }
  if (pressed('p1','punch')) { Sound.sfx.decide(); startArcade(); }
}

// =========================================================
// 結果
// =========================================================
function drawResult() {
  if (lastResult === 'clear') { drawClearScreen(); return; }
  drawBattle();
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  let head, sub, col;
  if (lastResult === 'lose') {
    head = 'ゲームオーバー';
    sub  = isTouch ? 'タップでタイトルへ' : 'スペースキーでタイトルへ';
    col  = '#fa5252';
  } else {
    head = `${arcadeRound + 1}戦目クリア！`;
    sub  = isTouch ? 'タップで次の相手へ' : 'スペースキーで次の相手へ';
    col  = '#69db7c';
  }
  ctx.fillStyle = col; ctx.font = 'bold 46px sans-serif';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 14;
  ctx.fillText(head, W/2, H/2 - 4); ctx.shadowBlur = 0;
  if (Math.floor(performance.now()/500)%2 === 0) {
    ctx.font = '20px sans-serif'; ctx.fillStyle = '#fff';
    ctx.fillText(sub, W/2, H/2 + 56);
  }
}

// クリア画面：reborn の割引クーポン（店舗情報つき）
function drawClearScreen() {
  drawBattle();
  ctx.fillStyle = 'rgba(0,0,0,0.86)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd43b'; ctx.font = 'bold 26px sans-serif';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  ctx.fillText('ゲームクリア！ おめでとう！', W/2, 34);
  ctx.shadowBlur = 0;
  const cw = 624, ch = 452, cx = (W-cw)/2, cy = 50;
  ctx.fillStyle = '#fffaf3'; ctx.fillRect(cx, cy, cw, ch);
  ctx.fillStyle = '#e8447f'; ctx.fillRect(cx, cy, cw, 46);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 23px sans-serif';
  ctx.fillText('reborn 蒲郡店　全身脱毛 割引券', W/2, cy+31);
  ctx.fillStyle = '#c0392b'; ctx.font = 'bold 40px sans-serif';
  ctx.fillText('全身脱毛 100円引き', W/2, cy+96);
  ctx.fillStyle = '#333'; ctx.font = '15px sans-serif';
  ctx.fillText('この画面を見せると100円割引になります', W/2, cy+126);
  ctx.fillStyle = '#c0392b'; ctx.font = 'bold 15px sans-serif';
  ctx.fillText('有効期限　2026年6月30日', W/2, cy+152);
  ctx.strokeStyle = '#e8447f'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx+30, cy+170); ctx.lineTo(cx+cw-30, cy+170); ctx.stroke();
  ctx.textAlign = 'left'; ctx.fillStyle = '#444'; ctx.font = '14px sans-serif';
  const info = [
    '店舗　　　reborn 蒲郡店',
    '住所　　　〒443-0021　愛知県蒲郡市三谷町十舗76-1',
    '電話　　　0533-81-6747',
    'アクセス　三河三谷駅より徒歩9分',
    '営業時間　10:00〜23:00（定休日なし）',
    '駐車場　　最大15台まで駐車可',
    '予約　　　予約制（当日予約可）',
  ];
  info.forEach((line, i) => ctx.fillText(line, cx+42, cy+198 + i*32));
  ctx.strokeStyle = '#e8447f'; ctx.lineWidth = 2;
  ctx.setLineDash([9,5]);
  ctx.strokeRect(cx+9, cy+9, cw-18, ch-18);
  ctx.setLineDash([]);
  ctx.textAlign = 'center';
  if (Math.floor(performance.now()/500)%2 === 0) {
    ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif';
    ctx.fillText(isTouch ? 'タップでタイトルへ' : 'スペースキーでタイトルへ', W/2, cy+ch+26);
  }
}

// コンティニュー画面
function drawContinue() {
  drawBattle();
  ctx.fillStyle = 'rgba(0,0,0,0.74)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fa5252'; ctx.font = 'bold 44px sans-serif';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 14;
  ctx.fillText('コンティニュー？', W/2, H/2 - 26); ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
  ctx.fillText(`残り ${continues} 回`, W/2, H/2 + 16);
  if (Math.floor(performance.now()/450)%2 === 0) {
    ctx.font = '17px sans-serif'; ctx.fillStyle = '#ffd43b';
    ctx.fillText(isTouch ? 'タップ＝つづける' : 'スペース＝つづける　　B＝やめる', W/2, H/2 + 56);
  }
}

function updateContinue() {
  if (pressedKeys.has(' ') || pressedKeys.has('f') || pressedKeys.has('j')) {
    continues--;
    startNextFight();
  } else if (pressedKeys.has('b') || pressedKeys.has('escape')) {
    lastResult = 'lose';
    gameState = 'result';
  }
}

function updateResult() {
  if (pressedKeys.has(' ') || pressedKeys.has('f') || pressedKeys.has('j')) {
    if (lastResult === 'win') { arcadeRound++; startNextFight(); }
    else gameState = 'title';
  }
}

// =========================================================
// メインループ
// =========================================================
function loop() {
  if (gameState === 'title')   { drawTitle();   updateTitle(); }
  else if (gameState === 'select') { drawSelect();  updateSelect(); }
  else if (gameState === 'stage')  { drawStageSelect(); updateStageSelect(); }
  else if (gameState === 'battle') { updateBattle(); drawBattle(); }
  else if (gameState === 'continue') { drawContinue(); updateContinue(); }
  else if (gameState === 'result') { drawResult();  updateResult(); }
  Sound.requestBgm(gameState === 'title' ? 'title' : gameState === 'battle' ? 'battle' : 'menu');
  pressedKeys = new Set();
  cpuState.pressed.clear();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
